<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICO Health: 幻境放慢版</title>
    <style>
        :root {
            --pico-bg: #1a1a2e;
            --pico-dark: #16213e;
            --pico-hero: #4ea5ff;
            --pico-door: #00f2fe;
            --pico-hp: #ff4757;
        }

        body {
            font-family: '微軟正黑體', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            color: #fff;
        }

        #start-screen, #review-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 30, 0.95);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        #review-screen { display: none; overflow-y: auto; padding: 20px; box-sizing: border-box; }

        .start-btn {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        #ui-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 10px 20px;
            font-weight: bold;
            box-sizing: border-box;
        }

        #question-box {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid #4facfe;
            color: white;
            padding: 15px;
            border-radius: 12px;
            width: 90%;
            max-width: 780px;
            text-align: center;
            backdrop-filter: blur(5px);
            margin-bottom: 10px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #game-wrapper { position: relative; width: 100%; max-width: 800px; }

        canvas {
            background-color: transparent;
            border: 2px solid #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
            border-radius: 8px;
            width: 100%;
            display: block;
        }

        #mobile-controls {
            display: none; width: 100%; justify-content: space-between;
            padding: 20px; box-sizing: border-box; position: fixed; bottom: 20px; left: 0;
        }

        .control-btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #4facfe; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 24px;
            user-select: none; color: white;
        }

        @media (max-width: 850px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<div id="start-screen">
    <h2>🌌 PICO 健康幻境：放慢試煉</h2>
    <div style="max-width: 85%; text-align: left; line-height: 1.6; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; border: 1px solid #4facfe;">
        <p>🐢 <b>速度優化：</b>移動平台速度已減半，跳躍更精準。</p>
        <p>✨ <b>操作提示：</b>左右鍵移動，上鍵跳躍。</p>
        <p>⚠️ <b>注意：</b>有些硬幣會隨平台移動，請看準時機！</p>
    </div>
    <button class="start-btn" onclick="startGame()">進入冒險</button>
</div>

<div id="review-screen">
    <h2 id="review-title">幻境終點</h2>
    <div id="final-score" style="font-size: 24px; margin-bottom: 20px; color: #f1c40f;"></div>
    <div id="review-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    <button class="start-btn" onclick="location.reload()">重新挑戰</button>
</div>

<div id="ui-top">
    <div id="status-hp">HP: ❤️❤️❤️</div>
    <div id="status-score">SCORE: 0</div>
</div>

<div id="question-box">
    <div id="q-level" style="font-size: 14px; color: #4facfe; margin-bottom: 5px;"></div>
    <div id="q-text">準備啟程...</div>
</div>

<div id="game-wrapper">
    <canvas id="game-canvas" width="800" height="520"></canvas>
    <div id="mobile-controls">
        <div style="display:flex; gap:10px;">
            <div class="control-btn" id="btn-left">⬅️</div>
            <div class="control-btn" id="btn-right">➡️</div>
        </div>
        <div class="control-btn" id="btn-jump">⬆️</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let quizBank = [
        { q: "成人每日建議飲水量是體重(kg)乘以多少？", options: ["10ml", "20ml", "30-35ml", "100ml"], correct: 2 },
        { q: "下列哪種運動最能增進心肺功能？", options: ["看電視", "慢跑", "睡覺", "滑手機"], correct: 1 },
        { q: "洗手「內外夾弓大立腕」，最後動作是？", options: ["指尖", "手背", "手心", "手腕"], correct: 3 },
        { q: "預防近視，用眼30分鐘應休息多久？", options: ["1分鐘", "10分鐘", "30分鐘", "不必"], correct: 1 },
        { q: "正確刷牙法「貝氏刷牙法」，刷毛與牙齒夾角？", options: ["15度", "45度", "90度", "180度"], correct: 1 },
        { q: "下列哪種食物含有豐富的維生素C？", options: ["白米飯", "芭樂", "炸雞", "可樂"], correct: 1 },
        { q: "心情不好時，哪種做法比較健康？", options: ["找人傾訴", "一直吃甜食", "悶在心裡", "亂發脾氣"], correct: 1 },
        { q: "吃太鹹容易引發哪種疾病？", options: ["高血壓", "近視", "香港腳", "感冒"], correct: 0 },
        { q: "BMI指數是用來測量什麼？", options: ["智力", "體重是否標準", "視力", "聽力"], correct: 1 },
        { q: "哪種飲料最健康？", options: ["珍珠奶茶", "純水", "能量飲", "碳酸飲料"], correct: 1 },
        { q: "中暑時應該優先做什麼？", options: ["跑步", "移至陰涼處", "穿大衣", "喝熱咖啡"], correct: 1 },
        { q: "哪種維生素跟眼睛健康最相關？", options: ["維生素A", "維生素B12", "維生素E", "維生素K"], correct: 0 }
    ];

    let currentLevel = 0;
    let score = 0;
    let hp = 3;
    let doorOpen = false;
    let gameStarted = false;
    let isWaiting = false;
    let animationId = null;
    let platforms = [], coins = [], wrongAnswers = [], stars = [];

    const player = {
        x: 50, y: 50, vx: 0, vy: 0, size: 24,
        onGround: false, speed: 4, jumpPower: -10.5, gravity: 0.42
    };

    const keys = {};

    for(let i=0; i<80; i++) stars.push({ x: Math.random()*800, y: Math.random()*520, size: Math.random()*2, opacity: Math.random() });

    function startGame() {
        if (gameStarted) return;
        document.getElementById('start-screen').style.display = 'none';
        quizBank.sort(() => Math.random() - 0.5);
        gameStarted = true;
        initLevel();
        gameLoop();
    }

    function generateMap() {
        // 放慢速度：將 speed 從 0.02/0.03 降至 0.01/0.015
        platforms = [
            { x: 0, y: 130, w: 200, h: 12, moveX: 0, range: 0, speed: 0 },
            { x: 300, y: 130, w: 200, h: 12, moveX: 0, range: 0, speed: 0 },
            { x: 600, y: 130, w: 200, h: 12, moveX: 0, range: 0, speed: 0 },
            // 中層移動平台 (速度放慢)
            { x: 100, y: 280, w: 160, h: 12, moveX: 1, range: 120, speed: 0.01, offset: 0 },
            { x: 500, y: 280, w: 160, h: 12, moveX: 1, range: 100, speed: 0.015, offset: Math.PI },
            // 底層
            { x: 0, y: 440, w: 320, h: 15, moveX: 0, range: 0, speed: 0 },
            { x: 480, y: 440, w: 320, h: 15, moveX: 0, range: 0, speed: 0 }
        ];

        platforms.forEach(p => { p.startX = p.x; p.startY = p.y; });
        coins = []; 
        const data = quizBank[currentLevel];
        let availablePlatforms = [...platforms];
        availablePlatforms.sort(() => Math.random() - 0.5);

        data.options.forEach((opt, i) => {
            const p = availablePlatforms[i % availablePlatforms.length];
            const cx = p.x + Math.random() * (p.w - 30);
            const cy = p.y - 45;
            coins.push({ x: cx, y: cy, text: opt, isCorrect: i === data.correct, collected: false, parentPlatform: p, pOffset: 0 });
        });

        player.x = 40; player.y = 80; player.vx = 0; player.vy = 0;
    }

    function initLevel() {
        doorOpen = false;
        isWaiting = true;
        if (currentLevel > 0 && currentLevel % 5 === 0 && hp < 3) hp++;
        generateMap();
        updateUI();
    }

    function updateUI() {
        document.getElementById('q-level').innerText = `STEP ${currentLevel + 1} / ${quizBank.length}`;
        document.getElementById('q-text').innerText = quizBank[currentLevel].q;
        document.getElementById('status-hp').innerText = "HP: " + "❤️".repeat(hp);
        document.getElementById('status-score').innerText = "SCORE: " + score;
    }

    function showReviewScreen(title) {
        gameStarted = false;
        document.getElementById('review-screen').style.display = 'flex';
        document.getElementById('review-title').innerText = title;
        document.getElementById('final-score').innerText = "最終得分: " + score;
        const listDiv = document.getElementById('review-list');
        listDiv.innerHTML = wrongAnswers.length === 0 ? "<p>完美通關！你是健康知識大師！</p>" : 
            wrongAnswers.map(item => `<div class="review-item"><strong>問：${item.q}</strong><br><span style="color: #00f2fe;">正解：${item.a}</span></div>`).join('');
    }

    function loseHp() {
        const currentQ = quizBank[currentLevel];
        if (!wrongAnswers.find(item => item.q === currentQ.q)) {
            wrongAnswers.push({ q: currentQ.q, a: currentQ.options[currentQ.correct] });
        }
        hp--;
        if (hp <= 0) showReviewScreen("生命值耗盡");
        else { updateUI(); player.x = 40; player.y = 80; isWaiting = true; }
    }

    window.addEventListener('keydown', e => { 
        if(gameStarted) {
            if(isWaiting && (e.code === 'Space' || e.code === 'ArrowUp')) isWaiting = false;
            keys[e.code] = true; 
        }
    });
    window.addEventListener('keyup', e => { if(gameStarted) keys[e.code] = false; });
    canvas.addEventListener('touchstart', (e) => { if(gameStarted && isWaiting) { isWaiting = false; e.preventDefault(); } });

    const btnMap = { 'btn-left': 'ArrowLeft', 'btn-right': 'ArrowRight', 'btn-jump': 'ArrowUp' };
    Object.keys(btnMap).forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if(gameStarted) { if(isWaiting) isWaiting = false; keys[btnMap[id]] = true; }
        });
        el.addEventListener('touchend', (e) => { e.preventDefault(); if(gameStarted) keys[btnMap[id]] = false; });
    });

    function update() {
        if (!gameStarted || isWaiting) return;

        platforms.forEach(p => {
            if(p.moveX) {
                let lastX = p.x;
                p.x = p.startX + Math.sin(Date.now() * p.speed + (p.offset || 0)) * p.range;
                // 如果玩家站在平台上，同步位移
                if (player.onGround && player.y + player.size === p.y && player.x + player.size > p.x && player.x < p.x + p.w) {
                    player.x += (p.x - lastX);
                }
            }
        });

        if (keys['ArrowLeft']) player.vx = -player.speed;
        else if (keys['ArrowRight']) player.vx = player.speed;
        else player.vx *= 0.8;

        if (keys['ArrowUp'] && player.onGround) {
            player.vy = player.jumpPower;
            player.onGround = false;
        }

        player.vy += player.gravity;
        player.x += player.vx;
        player.y += player.vy;
        player.onGround = false;

        platforms.forEach(p => {
            if (player.x + player.size > p.x && player.x < p.x + p.w &&
                player.y + player.size > p.y && player.y + player.size < p.y + p.h + 12 && player.vy >= 0) {
                player.y = p.y - player.size;
                player.vy = 0;
                player.onGround = true;
            }
        });

        coins.forEach(c => {
            if (!c.collected) {
                if(c.parentPlatform.moveX) c.x = c.parentPlatform.x + (c.pOffset || (c.pOffset = c.x - c.parentPlatform.startX));
                if (Math.abs(player.x - c.x) < 35 && Math.abs(player.y - c.y) < 45) {
                    c.collected = true;
                    if (c.isCorrect) {
                        doorOpen = true; score += 100;
                        document.getElementById('q-text').innerText = "答對了！過關門已開啟 ✨";
                        document.getElementById('question-box').style.backgroundColor = "rgba(46, 204, 113, 0.3)";
                    } else loseHp();
                }
            }
        });

        if (player.y > 520) loseHp();
        if (player.x < 0) player.x = 0;
        if (player.x > 800 - player.size) player.x = 800 - player.size;

        if (doorOpen && player.x > 710 && player.y > 360) {
            currentLevel++;
            if (currentLevel < quizBank.length) {
                initLevel();
                document.getElementById('question-box').style.backgroundColor = "rgba(22, 33, 62, 0.8)";
            }
            else showReviewScreen("成功征服健康幻境！");
        }
    }

    function draw() {
        let grad = ctx.createLinearGradient(0, 0, 0, 520);
        grad.addColorStop(0, "#0f0c29"); grad.addColorStop(1, "#24243e");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 800, 520);

        ctx.fillStyle = "white";
        stars.forEach(s => {
            ctx.globalAlpha = Math.abs(Math.sin(Date.now()*0.001 + s.opacity)*s.opacity);
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
        ctx.globalAlpha = 1.0;
        
        platforms.forEach(p => {
            ctx.fillStyle = "#4facfe";
            ctx.shadowBlur = 10; ctx.shadowColor = "#4facfe";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0;
        });
        
        coins.forEach(c => {
            if (!c.collected) {
                ctx.fillStyle = "#f1c40f"; ctx.shadowBlur = 15; ctx.shadowColor = "#f1c40f";
                ctx.beginPath(); ctx.arc(c.x+15, c.y+15, 12, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
                ctx.fillText(c.text, c.x + 15, c.y - 15);
            }
        });

        if (doorOpen) {
            ctx.fillStyle = "#00f2fe"; ctx.shadowBlur = 20; ctx.shadowColor = "#00f2fe";
            ctx.fillRect(720, 370, 50, 70); ctx.shadowBlur = 0;
        } else {
            ctx.strokeStyle = "#4facfe"; ctx.strokeRect(720, 370, 50, 70);
        }

        ctx.fillStyle = "#fff"; ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.fillStyle = "#4ea5ff"; ctx.fillRect(player.x+4, player.y+4, player.size-8, player.size-8);

        if (isWaiting) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2fe"; ctx.font = "bold 32px Arial"; ctx.textAlign = "center";
            ctx.fillText("🌌 準備踏入下一層幻境 🌌", canvas.width / 2, canvas.height / 2);
            ctx.font = "20px Arial"; ctx.fillStyle = "white";
            ctx.fillText("按空白鍵或點擊螢幕開始", canvas.width / 2, canvas.height / 2 + 50);
        }
    }

    function gameLoop() {
        if (!gameStarted) return;
        update(); draw();
        animationId = requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
